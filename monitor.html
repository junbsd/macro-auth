<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>감시 모니터</title>
<style>
  :root {
    --ink: #1c1c1c;
    --paper: #f7f6f3;
    --line: #dddad3;
    --ok: #2f6d4f;
    --ok-bg: #e6f0ea;
    --off: #8b8681;
    --off-bg: #efece7;
    --start-green: #2e7d32;
    --start-green-dark: #1b5e20;
    --stop-red: #c62828;
    --stop-red-dark: #8e0000;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    padding: 24px;
    gap: 14px;
  }
  #gate button {
    font: inherit;
    background: #2b4a63;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 15px;
  }
  #app {
    display: none;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 16px calc(env(safe-area-inset-bottom, 16px) + 8px);
  }
  header {
    padding: 8px 0 14px;
    text-align: center;
    flex-shrink: 0;
  }
  header .name {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  header .sub {
    font-size: 12px;
    color: #79746c;
    margin-top: 4px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 8px;
  }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; }
  .badge-online { background: var(--ok-bg); color: var(--ok); }
  .badge-online .badge-dot { background: var(--ok); }
  .badge-offline { background: var(--off-bg); color: var(--off); }
  .badge-offline .badge-dot { background: var(--off); }

  .polling-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .polling-label { font-size: 13px; color: #79746c; font-weight: 600; }
  .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch-track {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--off-bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    transition: background-color 0.15s ease;
  }
  .switch-thumb {
    position: absolute;
    height: 20px; width: 20px;
    left: 2px; top: 2px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    transition: transform 0.15s ease;
  }
  .switch input:checked + .switch-track { background: var(--ok); border-color: var(--ok); }
  .switch input:checked + .switch-track .switch-thumb { transform: translateX(20px); }
  .switch input:disabled + .switch-track { opacity: 0.5; cursor: default; }
  .polling-hint { font-size: 11px; color: #a19c93; margin-top: 4px; }

  .rooms {
    flex-shrink: 0;
    background: white;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .rooms .label {
    font-size: 11px;
    color: #a19c93;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .rooms .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .room-chip {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 13px;
  }
  .rooms .empty { color: #a19c93; font-size: 13px; }

  #toggleBtn {
    flex-shrink: 0;
    width: 100%;
    height: 25vh;
    min-height: 140px;
    max-height: 220px;
    border: none;
    border-radius: 20px;
    font-size: 26px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.02em;
    transition: background-color 0.15s ease;
  }
  #toggleBtn.start { background: var(--start-green); }
  #toggleBtn.start:active { background: var(--start-green-dark); }
  #toggleBtn.stop { background: var(--stop-red); }
  #toggleBtn.stop:active { background: var(--stop-red-dark); }
  #toggleBtn:disabled { opacity: 0.6; }

  .secondary-row {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .secondary-btn {
    flex: 1;
    height: 48px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: white;
    color: var(--ink);
    font-size: 15px;
    font-weight: 600;
  }
  .secondary-btn:disabled { opacity: 0.4; }
  .secondary-btn:not(:disabled):active { background: var(--paper); }

  .log-wrap {
    flex: 1;
    min-height: 0;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
  }
  .log-wrap .label {
    font-size: 11px;
    color: #a19c93;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  #logBox {
    flex: 1;
    background: #1c1c1c;
    color: #d7f5d7;
    border-radius: 14px;
    padding: 16px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow-y: auto;
    display: flex;
    align-items: center;
  }
  #logBox .empty { color: #6b6b6b; }
</style>
</head>
<body>

<div id="gate">
  <div style="font-size:15px; color:#79746c;">로그인 후 이용할 수 있습니다.</div>
  <button id="signinBtn">구글로 로그인</button>
</div>

<div id="app">
  <header>
    <div class="name" id="deviceName">-</div>
    <div class="sub" id="deviceSub"></div>
    <div id="statusBadge"></div>
    <div class="polling-row">
      <span class="polling-label">원격대기</span>
      <label class="switch">
        <input type="checkbox" id="pollingSwitch">
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </label>
    </div>
    <div class="polling-hint" id="pollingHint"></div>
  </header>

  <div class="rooms">
    <div class="label">감지 중인 방</div>
    <div class="chips" id="roomChips"><span class="empty">-</span></div>
  </div>

  <button id="toggleBtn" class="start" disabled>감지시작</button>
  <div class="secondary-row">
    <button id="prepareBtn" class="secondary-btn" disabled>메시지입력</button>
    <button id="clearBtn" class="secondary-btn" disabled>메시지삭제</button>
  </div>

  <div class="log-wrap">
    <div class="label">로그</div>
    <div id="logBox"><span class="empty">아직 로그가 없습니다</span></div>
  </div>
</div>

<!--
  사용 전 설정할 것 (admin_dashboard.html과 동일하게):
  1. firebaseConfig를 본인 Firebase 프로젝트 설정 값으로 교체
  2. ADMIN_EMAIL을 관리자 본인 구글 이메일로 교체
  접속 방법: 이 페이지에 ?device=기기ID 형태로 접속 (admin_dashboard.html의
  각 기기 카드에서 [모니터링] 버튼을 누르면 자동으로 이 형태로 이동합니다).
-->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, doc, onSnapshot, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  // ── 1) 본인 Firebase 프로젝트 설정으로 교체 ──
  const firebaseConfig = {
    apiKey: "AIzaSyCgHyXMHokjnN0o04VV6U_YB7QH7O36jwM",
    authDomain: "junbsd.firebaseapp.com",
    projectId: "macro-auth",
  };

  // ── 2) 관리자 본인 구글 이메일 (firestore.rules와 반드시 동일해야 함) ──
  const ADMIN_EMAIL = "junbsd@gmail.com";

  const ONLINE_THRESHOLD_MS = 2 * 60 * 1000;

  const params = new URLSearchParams(window.location.search);
  const deviceId = params.get("device");

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const gate = document.getElementById("gate");
  const appEl = document.getElementById("app");
  const signinBtn = document.getElementById("signinBtn");
  const deviceName = document.getElementById("deviceName");
  const deviceSub = document.getElementById("deviceSub");
  const statusBadge = document.getElementById("statusBadge");
  const pollingSwitch = document.getElementById("pollingSwitch");
  const pollingHint = document.getElementById("pollingHint");
  const roomChips = document.getElementById("roomChips");
  const toggleBtn = document.getElementById("toggleBtn");
  const prepareBtn = document.getElementById("prepareBtn");
  const clearBtn = document.getElementById("clearBtn");
  const logBox = document.getElementById("logBox");

  signinBtn.onclick = () => {
    ensureAudioUnlocked();
    signInWithPopup(auth, provider).catch(err => alert("로그인 실패: " + err.message));
  };

  // ── 전송완료 알림음 (방법 A: 이 페이지가 화면에 떠 있을 때만 울림) ──
  // 별도 음원 파일 없이 Web Audio API로 그때그때 소리를 직접 만들어서
  // 재생한다(파일 호스팅/네트워크 요청 불필요). 아이폰 사파리는 사용자가
  // 화면을 한 번이라도 터치하기 전엔 소리 재생 자체를 막아두므로, 버튼을
  // 누르는 시점에 미리 "잠금 해제"를 해둔다 - 이미 있는 버튼 클릭에
  // 자연스럽게 끼워넣어서 별도 동작을 요구하지 않는다.
  let audioCtx = null;
  function ensureAudioUnlocked() {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
  }
  function playAlertSound() {
    if (!audioCtx || audioCtx.state !== "running") return;
    const now = audioCtx.currentTime;
    const step = 0.16;
    [880, 1320].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, now + i * step);
      gain.gain.exponentialRampToValueAtTime(0.35, now + i * step + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + (i + 1) * step);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + i * step);
      osc.stop(now + (i + 1) * step + 0.02);
    });
  }
  let lastPlayedLog = null; // 같은 로그로 소리가 중복 재생되지 않게(스냅샷이 다른 이유로도 여러 번 옴)

  if (!deviceId) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#79746c;">기기가 지정되지 않았습니다.<br>관리 화면에서 [모니터링] 버튼으로 접속해주세요.</div>';
    throw new Error("no device id");
  }

  let pendingCommand = false; // 버튼 눌러서 명령 보낸 직후, PC가 실제로 반영할 때까지의 과도 상태
  let pendingWantRunning = null; // 클릭했을 때 내가 원하던 방향(true=시작 원함, false=중지 원함)
  let pendingPrepare = false;
  let pendingPrepareSince = 0; // 클릭 시각(ms) - 타임아웃 판단용
  let pendingClear = false;
  let pendingClearSince = 0;
  let pollingSwitchDragging = false; // 스위치를 막 조작한 직후, 그 사이 도착한 스냅샷이 값을 되돌리지 않게 함

  function isOnline(lastSeenIso) {
    if (!lastSeenIso) return false;
    return (Date.now() - new Date(lastSeenIso).getTime()) < ONLINE_THRESHOLD_MS;
  }

  function render(data) {
    deviceName.textContent = data.display_name || data.hostname || deviceId;
    deviceSub.textContent = data.display_name && data.hostname ? data.hostname : "";

    // [원격대기 스위치] 필드가 아직 없는 기기는 켜짐(true)으로 취급 - PC 쪽
    // 기본값과 동일하게 맞춤.
    const pollingEnabled = data.polling_enabled !== false;
    const online = isOnline(data.last_seen);

    statusBadge.innerHTML = "";
    const b = document.createElement("span");
    if (!pollingEnabled) {
      // 원격대기를 꺼두면 PC가 하트비트(last_seen 갱신) 자체를 안 보내서
      // last_seen이 계속 오래된 값으로 남는다 - 그걸 "오프라인"으로 보여주면
      // 마치 PC가 꺼진 것처럼 혼동을 주므로, "원격대기 꺼짐"이라는 별도
      // 상태로 명확히 구분해서 보여준다.
      b.className = "badge badge-offline";
      b.innerHTML = '<span class="badge-dot"></span>원격대기 꺼짐';
    } else {
      b.className = "badge " + (online ? "badge-online" : "badge-offline");
      b.innerHTML = '<span class="badge-dot"></span>' + (online ? "PC 켜짐" : "PC 꺼짐/오프라인");
    }
    statusBadge.appendChild(b);

    if (!pollingSwitchDragging) {
      pollingSwitch.checked = pollingEnabled;
    }
    pollingHint.textContent = pollingEnabled
      ? "켜짐 - 5초마다 원격 명령 확인 (Firestore 사용량 발생)"
      : "꺼짐 - 5분마다만 확인, 이 기기는 원격으로 시작 못 함";

    const rooms = Array.isArray(data.room_names) ? data.room_names : [];
    roomChips.innerHTML = "";
    if (rooms.length === 0) {
      roomChips.innerHTML = '<span class="empty">설정된 방 없음</span>';
    } else {
      rooms.forEach(r => {
        const chip = document.createElement("span");
        chip.className = "room-chip";
        chip.textContent = r;
        roomChips.appendChild(chip);
      });
    }

    const running = !!data.is_running;
    // [버그 수정] 예전엔 toggleBtn.className을 running 보고 정해놓은 직후에
    // 그 값을 다시 running과 비교해서 "아직 안 바뀜"을 판단했는데, 그 두
    // 값이 항상 서로 일치하게 되어 있어서(둘 다 같은 running에서 나옴)
    // 조건이 사실상 항상 참이 되어 "처리 중..."이 절대 안 풀리는 문제가
    // 있었다(실측 확인). 이제 "클릭했을 때 내가 원했던 방향"을 별도로
    // 저장해두고, 실제 서버 상태(running)가 그 방향과 같아지면 그때
    // 정확히 pendingCommand를 해제한다.
    if (pendingCommand && running === pendingWantRunning) {
      pendingCommand = false;
    }
    if (!pollingEnabled) {
      toggleBtn.disabled = true;
      toggleBtn.textContent = "원격대기 꺼짐";
      toggleBtn.className = "start";
    } else if (!online) {
      toggleBtn.disabled = true;
      toggleBtn.textContent = "PC 오프라인";
      toggleBtn.className = "start";
    } else if (running) {
      toggleBtn.textContent = pendingCommand ? "중지 처리 중..." : "중지";
      toggleBtn.className = "stop";
      toggleBtn.disabled = pendingCommand;
    } else {
      toggleBtn.textContent = pendingCommand ? "시작 처리 중..." : "감지시작";
      toggleBtn.className = "start";
      toggleBtn.disabled = pendingCommand;
    }

    // [메시지입력] 감시 중이거나 PC가 오프라인이면 사용 불가. "처리 중"일
    // 때는 새 로그가 클릭 시점보다 뒤에 도착하거나, 일정 시간(20초)이
    // 지나면 안전장치로 자동으로 풀어서 다시 눌러볼 수 있게 한다(메시지입력은
    // start/stop과 달리 "원하는 최종 상태"가 없는 1회성 동작이라 로그 도착
    // 여부만으로는 놓치는 경우- 예: last_log가 클릭 직후와 우연히 같은
    // 타이밍에 갱신 - 를 대비한 이중 안전장치).
    if (pendingPrepare) {
      const logArrived = data.last_log_at && new Date(data.last_log_at).getTime() > pendingPrepareSince;
      const timedOut = Date.now() - pendingPrepareSince > 20000;
      if (logArrived || timedOut) {
        pendingPrepare = false;
      }
    }
    if (!pollingEnabled || !online || running) {
      prepareBtn.disabled = true;
      prepareBtn.textContent = "메시지입력";
    } else if (pendingPrepare) {
      prepareBtn.disabled = true;
      prepareBtn.textContent = "준비 중... (로그 확인)";
    } else {
      prepareBtn.disabled = false;
      prepareBtn.textContent = "메시지입력";
    }

    // [메시지삭제] 메시지입력과 완전히 동일한 원칙(감시 중/오프라인이면
    // 사용 불가, 로그 도착 또는 20초 타임아웃으로 "처리 중" 자동 해제).
    if (pendingClear) {
      const logArrived = data.last_log_at && new Date(data.last_log_at).getTime() > pendingClearSince;
      const timedOut = Date.now() - pendingClearSince > 20000;
      if (logArrived || timedOut) {
        pendingClear = false;
      }
    }
    if (!pollingEnabled || !online || running) {
      clearBtn.disabled = true;
      clearBtn.textContent = "메시지삭제";
    } else if (pendingClear) {
      clearBtn.disabled = true;
      clearBtn.textContent = "삭제 중... (로그 확인)";
    } else {
      clearBtn.disabled = false;
      clearBtn.textContent = "메시지삭제";
    }

    if (data.last_log) {
      logBox.innerHTML = "";
      const line = document.createElement("div");
      line.textContent = data.last_log;
      logBox.appendChild(line);

      // [소리 알림] "전송완료"가 포함된 새 로그일 때만 울림(원격제어/메시지입력
      // 결과 같은 다른 로그들은 소리 없이 화면 표시만). 같은 로그 내용으로
      // 스냅샷이 여러 번 와도(다른 필드 변경 등) 한 번만 울리게 lastPlayedLog로 방지.
      if (data.last_log !== lastPlayedLog && data.last_log.includes("[전송완료]")) {
        lastPlayedLog = data.last_log;
        playAlertSound();
      } else if (data.last_log !== lastPlayedLog) {
        lastPlayedLog = data.last_log; // 전송완료가 아니어도 "이미 본 로그"로는 기록
      }
    }
  }

  prepareBtn.onclick = async () => {
    ensureAudioUnlocked();
    pendingPrepare = true;
    pendingPrepareSince = Date.now();
    prepareBtn.disabled = true;
    prepareBtn.textContent = "준비 중... (로그 확인)";
    try {
      await updateDoc(doc(db, "devices", deviceId), {
        command: "prepare_message",
        command_issued_at: new Date().toISOString(),
      });
    } catch (err) {
      alert("명령 전송 실패: " + err.message);
      pendingPrepare = false;
    }
  };

  clearBtn.onclick = async () => {
    ensureAudioUnlocked();
    pendingClear = true;
    pendingClearSince = Date.now();
    clearBtn.disabled = true;
    clearBtn.textContent = "삭제 중... (로그 확인)";
    try {
      await updateDoc(doc(db, "devices", deviceId), {
        command: "clear_message",
        command_issued_at: new Date().toISOString(),
      });
    } catch (err) {
      alert("명령 전송 실패: " + err.message);
      pendingClear = false;
    }
  };

  pollingSwitch.onchange = async () => {
    ensureAudioUnlocked();
    pollingSwitchDragging = true;
    const newValue = pollingSwitch.checked;
    pollingSwitch.disabled = true;
    try {
      await updateDoc(doc(db, "devices", deviceId), { polling_enabled: newValue });
    } catch (err) {
      alert("전송 실패: " + err.message);
      pollingSwitch.checked = !newValue; // 실패했으면 원래대로 되돌림
    } finally {
      pollingSwitch.disabled = false;
      pollingSwitchDragging = false;
    }
  };

  toggleBtn.onclick = async () => {
    ensureAudioUnlocked();
    const wantStart = toggleBtn.className === "start";
    pendingCommand = true;
    pendingWantRunning = wantStart;
    toggleBtn.disabled = true;
    toggleBtn.textContent = wantStart ? "시작 처리 중..." : "중지 처리 중...";
    try {
      await updateDoc(doc(db, "devices", deviceId), {
        command: wantStart ? "start" : "stop",
        command_issued_at: new Date().toISOString(),
      });
    } catch (err) {
      alert("명령 전송 실패: " + err.message);
      pendingCommand = false;
    }
  };

  let unsubscribe = null;

  function startWatching() {
    if (unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(doc(db, "devices", deviceId), (snap) => {
      if (!snap.exists()) {
        document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#79746c;">이 기기를 찾을 수 없습니다.</div>';
        return;
      }
      render(snap.data());
    }, (err) => {
      logBox.textContent = "읽기 오류: " + err.message;
    });
  }

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      gate.style.display = "flex";
      appEl.style.display = "none";
      if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      return;
    }
    if (user.email !== ADMIN_EMAIL) {
      gate.innerHTML = '<div style="padding:24px;text-align:center;color:#79746c;">이 계정(' + user.email + ')은 권한이 없습니다.</div>';
      gate.style.display = "flex";
      appEl.style.display = "none";
      return;
    }
    gate.style.display = "none";
    appEl.style.display = "flex";
    startWatching();
  });
</script>
</body>
</html>
